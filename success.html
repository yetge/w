<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Submitted</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --bg: #050505;
        --card: rgba(255,255,255,0.04);
        --border: rgba(255,255,255,0.08);
        --text: #ffffff;
        --muted: rgba(255,255,255,0.45);
        --success: #8bff7a;
    }

    body {
        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        padding: 24px;

        font-family: 'Inter', sans-serif;

        background:
            radial-gradient(circle at top left, rgba(139,255,122,0.08), transparent 30%),
            radial-gradient(circle at bottom right, rgba(255,255,255,0.04), transparent 30%),
            var(--bg);

        overflow: hidden;
    }

    .success-card {
        width: 100%;
        max-width: 480px;

        padding: 42px 28px;

        border-radius: 30px;

        background: var(--card);
        border: 1px solid var(--border);

        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);

        box-shadow:
            0 10px 40px rgba(0,0,0,0.45),
            inset 0 1px 0 rgba(255,255,255,0.05);

        text-align: center;

        animation: float 5s ease-in-out infinite;
    }

    .check {
        width: 74px;
        height: 74px;

        margin: 0 auto 24px;

        border-radius: 50%;

        display: flex;
        justify-content: center;
        align-items: center;

        background: rgba(139,255,122,0.08);
        border: 1px solid rgba(139,255,122,0.18);

        color: var(--success);

        font-size: 32px;

        box-shadow:
            0 0 40px rgba(139,255,122,0.12);
    }

    h1 {
        color: var(--text);
        font-size: clamp(34px, 6vw, 54px);
        font-weight: 700;
        letter-spacing: -2px;

        margin-bottom: 10px;
    }

    p {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
    }

    @keyframes float {
        0%, 100% {
            transform: translateY(0px);
        }

        50% {
            transform: translateY(-6px);
        }
    }

    @media (max-width: 600px) {
        .success-card {
            padding: 34px 22px;
            border-radius: 24px;
        }

        .check {
            width: 66px;
            height: 66px;
            font-size: 28px;
        }

        p {
            font-size: 14px;
        }
    }
</style>
</head>

<body>

<div class="success-card">
    <div class="check">✓</div>

    <h1>Submitted</h1>

    <p>Your form was sent successfully.</p>
</div>

</body>
</html>
