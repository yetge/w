<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenders</title>
</head>
<body>
    <form action="/submit" method="post">
        <input type="text" id="category" name="category" placeholder="Category (e.g., 03100000)"><br><br>
        <input type="email" id="email" name="email" placeholder="Email"><br><br>
        <input type="submit" value="Submit">
    </form>

    <script>
        document.querySelector('form').addEventListener('submit', async(event) => {
            event.preventDefault();

            const category = document.getElementById('category').value;
            const email = document.getElementById('email').value;

            try {
                const res = await fetch('https://sultry-seamier-adalynn.ngrok-free.dev/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ category, email })
                });

                if (!res.ok) {
                    throw new Error(`Server returned status ${res.status}`);
                }

                const answer = await res.text();
                console.log('Received response:', answer);

                if (answer == "OK") {
                    window.location.href = "success.html";
                }
            } catch (err) {
                console.error('Fetch error:', err);
                alert('An error occurred while submitting the form.');
            }
        });
    </script>
</body>
</html>
